{% extends 'base.html' %}
{% load static %}

{% block title %}Reschedule Appointment - ClinicEasy{% endblock %}

{% block content %}

<div class="container" style="margin-top: 110px;">  <!-- FIX NAVBAR OVERLAP -->
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg border-0 rounded-4">

        <!-- HEADER -->
        <div class="card-header text-center"
             style="background: linear-gradient(135deg, #ffc107, #ff9800); border-radius: 16px 16px 0 0;">
          <h4 class="mb-0 fw-bold text-dark">Reschedule Appointment</h4>
        </div>

        <!-- BODY -->
        <div class="card-body p-4">

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}

          <form method="post">
            {% csrf_token %}

            <!-- DATE -->
            <div class="mb-4">
              <label class="form-label fw-semibold">
                New Appointment Date
              </label>
              <input type="date" name="date"
                     class="form-control rounded-3 p-2">
            </div>

            <!-- TIME -->
            <div class="mb-4">
              <label class="form-label fw-semibold">
                New Appointment Time 
              </label>
              <input type="time" name="time"
                     class="form-control rounded-3 p-2">
            </div>

            <!-- BUTTONS -->
            <div class="d-flex justify-content-between mt-4">
              <a href="{% url 'my_appointments' %}"
                 class="btn btn-outline-secondary px-4 rounded-pill">
                Back
              </a>

              <button type="submit"
                      class="btn btn-primary px-4 rounded-pill shadow-sm">
                Confirm
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
