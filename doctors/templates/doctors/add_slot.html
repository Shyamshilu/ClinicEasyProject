{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
  <h3>Add Availability Slot</h3>

  <form method="post" class="mb-4">
    {% csrf_token %}
    <div class="row">
      <div class="col-md-3">
        <input type="date" name="date" class="form-control" required>
      </div>
      <div class="col-md-3">
        <input type="time" name="start_time" class="form-control" required>
      </div>
      <div class="col-md-3">
        <input type="time" name="end_time" class="form-control" required>
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary">Add Slot</button>
      </div>
    </div>
  </form>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Date</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {% for s in slots %}
      <tr>
        <td>{{ s.date }}</td>
        <td>{{ s.start_time }}</td>
        <td>{{ s.end_time }}</td>
        <td>
          {% if s.is_available %}
            <span class="badge bg-success">Available</span>
          {% else %}
            <span class="badge bg-danger">Booked</span>
          {% endif %}
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="4">No slots added</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
