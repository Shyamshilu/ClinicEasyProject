{% extends 'adminpanel/base.html' %}

{% block content %}
<div class="card col-md-6 mx-auto shadow-sm">
    <div class="card-body text-center">
        <h5>Delete Doctor</h5>
        <p>Are you sure you want to delete <strong>{{ doctor.name }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'admin_doctors' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
