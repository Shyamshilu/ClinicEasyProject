<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ClinicEasy Admin</title>

    <!-- Bootstrap  CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    >
</head>

<body class="bg-light">

<div class="d-flex">

    <div class="bg-primary text-white p-3" style="width:260px; min-height:100vh;">
        <h4 class="fw-bold">ClinicEasy</h4>
        <small class="text-light">Admin Panel</small>
        <hr>

        <a href="{% url 'admin_dashboard' %}" class="text-white text-decoration-none d-block mb-2">
            📊 Dashboard
        </a>
        <a href="{% url 'admin_users' %}" class="text-white text-decoration-none d-block mb-2">
            👤 Manage Users
        </a>


        <a href="{% url 'admin_doctors' %}" class="text-white text-decoration-none d-block mb-2">
            👨‍⚕️ Doctors
        </a>
        <a href="{% url 'admin_patients' %}" class="text-white text-decoration-none d-block mb-2">
            🧑 Patients
        </a>

        <a href="{% url 'admin_appointments' %}" class="text-white text-decoration-none d-block mb-2">
            📅 Appointments
        </a>

        <a href="{% url 'admin_feedback' %}" class="text-white text-decoration-none d-block mb-2">
            💬 Feedback
       </a>


        <hr>

        <a href="{% url 'admin_logout' %}" class="text-white text-decoration-none d-block">
            🚪 Logout
        </a>
    </div>

    <div class="p-4 w-100">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
