<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | ClinicEasy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: #f4f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 14px;
            padding: 35px 30px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.08);
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-header i {
            font-size: 42px;
            color: #1976d2;
            margin-bottom: 8px;
        }

        .login-header h4 {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 13px;
            color: #666;
        }

        .form-control {
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 14px;
        }

        .input-group-text {
            border-radius: 10px 0 0 10px;
            background: #f1f5fb;
        }

        .btn-login {
            background: #1976d2;
            border: none;
            color: #fff;
            font-weight: 600;
            border-radius: 10px;
            padding: 11px;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #0d47a1;
        }

        .alert {
            font-size: 13px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="login-box">

    <div class="login-header">
        <i class="bi bi-shield-lock-fill"></i>
        <h4>ClinicEasy</h4>
        <p>Admin Login</p>
    </div>

    {% if error %}
    <div class="alert alert-danger text-center">
        {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3 input-group">
            <span class="input-group-text">
                <i class="bi bi-person"></i>
            </span>
            <input type="text" name="username"
                   class="form-control"
                   placeholder="Username"
                   required autofocus>
        </div>

        <div class="mb-4 input-group">
            <span class="input-group-text">
                <i class="bi bi-lock"></i>
            </span>
            <input type="password" name="password"
                   class="form-control"
                   placeholder="Password"
                   required>
        </div>

        <button type="submit" class="btn btn-login w-100">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </button>
    </form>

</div>

</body>
</html>
