{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | ClinicEasy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #edf5ff, #f9fbff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 45px rgba(13,110,253,0.15);
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo i {
      font-size: 48px;
      color: #0d6efd;
    }

    .logo h2 {
      margin-top: 5px;
      font-weight: 600;
      color: #0d6efd;
    }

    .subtitle {
      text-align: center;
      color: #6c757d;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .form-control {
      height: 48px;
      border-radius: 10px;
      border: 1px solid #dbe9ff;
    }

    .form-control:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.15rem rgba(13,110,253,0.15);
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #6c757d;
    }

    .btn-login {
      background: #0d6efd;
      border: none;
      height: 48px;
      border-radius: 10px;
      font-weight: 500;
      color: #fff;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #0b5ed7;
      transform: translateY(-1px);
    }

    .error-msg {
      background: #e7f1ff;
      color: #084298;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="login-card">

    <!-- Logo -->
    <div class="logo">
      <i class="bi bi-heart-pulse-fill"></i>
      <h2>ClinicEasy</h2>
    </div>
    <div class="subtitle">Login to your account</div>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <input type="text" name="username" class="form-control" placeholder="Email" required>
      </div>

      <div class="mb-4 password-wrapper">
        <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
        <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
      </div>

      <button type="submit" class="btn btn-login w-100">Login</button>
    </form>
  <p class="text-center mt-4 mb-0">
              Create an account?
              <a href="{% url 'register' %}" class="text-primary fw-semibold">Register here</a><br>
              <a href="{% url 'admin_login' %}" class="text-success fw-semibold">Login As Admin</a>
            </p>

  </div>

  <!-- JS -->
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });
  
  </script>
  
</body>
</html>
